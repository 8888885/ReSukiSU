name: Add KPM UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create KpmPage.kt
        run: |
          mkdir -p manager/app/src/main/java/com/resukisu/resukisu/ui/screen/main
          cat > manager/app/src/main/java/com/resukisu/resukisu/ui/screen/main/KpmPage.kt << 'ENDOFFILE'
package com.resukisu.resukisu.ui.screen.main

import androidx.compose.foundation.layout.*
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.*
import androidx.compose.ui.unit.Dp

@Composable
fun KpmPage(bottomPadding: Dp) {
    Column(
        modifier = Modifier
            .fillMaxSize()
            .padding(bottom = bottomPadding)
            .padding(16.dp),
        horizontalAlignment = Alignment.CenterHorizontally,
        verticalArrangement = Arrangement.Center
    ) {
        Text(
            text = "KPM Module Management",
            style = MaterialTheme.typography.headlineMedium
        )
        Spacer(modifier = Modifier.height(16.dp))
        Text(
            text = "Load and manage kernel modules",
            style = MaterialTheme.typography.bodyLarge
        )
    }
}
ENDOFFILE

      - name: Create KpmViewModel.kt
        run: |
          mkdir -p manager/app/src/main/java/com/resukisu/resukisu/ui/viewmodel
          cat > manager/app/src/main/java/com/resukisu/resukisu/ui/viewmodel/KpmViewModel.kt << 'ENDOFFILE'
package com.resukisu.resukisu.ui.viewmodel

import androidx.lifecycle.ViewModel

class KpmViewModel : ViewModel()
ENDOFFILE

      - name: Add KPM route
        run: |
          FILE="manager/app/src/main/java/com/resukisu/resukisu/ui/navigation/Routes.kt"
          sed -i '/data object Settings : Route/a\
\
    @Parcelize\
    @Serializable\
    data object Kpm : Route' "$FILE"

      - name: Add KPM to bottom bar
        run: |
          FILE="manager/app/src/main/java/com/resukisu/resukisu/ui/screen/BottomBarDestination.kt"
          
          # Add import
          sed -i '/import com.resukisu.resukisu.ui.screen.main.SuperUserPage/a\
import com.resukisu.resukisu.ui.screen.main.KpmPage' "$FILE"
          
          # Add icon import
          sed -i '/import androidx.compose.material.icons.twotone.Extension/a\
import androidx.compose.material.icons.twotone.Memory' "$FILE"
          
          # Add KPM entry before Settings
          sed -i '/    Settings(/i\
    Kpm(\
        { bottomPadding -> KpmPage(bottomPadding) },\
        R.string.kpm,\
        Icons.TwoTone.Memory,\
        Icons.TwoTone.Memory,\
        true\
    ),' "$FILE"

      - name: Add KPM string resource
        run: |
          FILE="manager/app/src/main/res/values/strings.xml"
          if ! grep -q '<string name="kpm">' "$FILE"; then
              sed -i '/<string name="settings">/i\
    <string name="kpm">KPM</string>' "$FILE"
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build APK
        working-directory: manager
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-with-KPM-UI
          path: manager/app/build/outputs/apk/debug/*.apk

      - name: Commit and push
        run: |
          git add -A
          git commit -m "Add KPM UI to latest ReSukiSU" || echo "Nothing to commit"
          git push origin HEAD
